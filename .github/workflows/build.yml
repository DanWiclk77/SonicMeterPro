name: Build VST3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '25'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # JUCE usually doesn't need extra libs on Windows for basic plugins

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Standard macOS dependencies

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64
        if: runner.os == 'Windows'

      - name: Configure CMake (macOS)
        run: cmake -B build -G Xcode
        if: runner.os == 'macOS'

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Upload Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SonicMeterPro-Win
          path: build/SonicMeterPro_artefacts/Release/VST3/SonicMeter Pro.vst3

      - name: Upload Artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: SonicMeterPro-Mac
          path: build/SonicMeterPro_artefacts/Release/VST3/SonicMeter Pro.vst3
